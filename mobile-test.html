<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mobile Test</title>
<style>
body { margin: 0; padding: 20px; background: #f0f0f0; font-family: sans-serif; }
.frame-container {
  width: 375px;
  height: 700px;
  margin: 0 auto;
  border: 2px solid #333;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  position: relative;
}
iframe {
  width: 375px;
  height: 700px;
  border: none;
  transform-origin: top left;
}
h1 { text-align: center; color: #333; }
p { text-align: center; color: #666; }
</style>
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mobile Test">
  <meta name="twitter:image" content="https://tips.co.za/assets/og-image.png">
</head>
<body>
<h1>Mobile Viewport Test (375px)</h1>
<p>Showing site at 375px mobile width</p>
<div class="frame-container">
  <iframe id="mobileFrame" src="index.html" width="375" height="700"></iframe>
</div>
</body>
</html>
