name = "tips-odds-proxy"
main = "odds-proxy.js"
compatibility_date = "2024-09-23"

# Route: tips.co.za/api/* → this Worker
# All other routes → Cloudflare Pages (static site)
routes = [
  { pattern = "tips.co.za/api/*", zone_name = "tips.co.za" }
]

# The ODDS_API_KEY secret is set via:
#   wrangler secret put ODDS_API_KEY
# (never committed to code)
